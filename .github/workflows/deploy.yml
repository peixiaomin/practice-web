name: Docker CI/CD 自动部署

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 构建 Docker 镜像
      - name: Build Docker image
        run: docker build -t vue-app .

      # 上传镜像 → 保存成压缩包
      - name: Save image
        run: docker save -o vue-app.tar vue-app

      # 传到你的云服务器
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd /root
            rm -rf vue-app.tar
          scp_source: vue-app.tar
          scp_target: /root/

      # 服务器加载镜像 + 重启
      - name: Run Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            docker load -i /root/vue-app.tar
            docker stop vue-app || true
            docker rm vue-app || true
            docker run -d \
              --name vue-app \
              --restart always \
              -p 80:80 \
              vue-app
